<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TR Chat - Neon</title>
    <link rel="stylesheet" href="style.css">
    <!-- İkonlar için FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- GİRİŞ EKRANI -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-box glow-box">
            <h2 class="neon-text">TR CHAT</h2>
            <p>Karanlık tarafa hoş geldin.</p>
            <input type="text" id="usernameInput" placeholder="Kullanıcı Adın" autocomplete="off" maxlength="15">
            <button id="joinBtn" class="neon-btn">Sohbete Katıl</button>
        </div>
    </div>

    <!-- ANA UYGULAMA -->
    <div class="app-container" id="appContainer" style="display: none;">
        <div class="sidebar">
            <h2 class="neon-text">TR Chat</h2>
            <ul class="channel-list">
                <li class="active"><i class="fa-solid fa-hashtag"></i> genel-sohbet</li>
                <li><i class="fa-solid fa-hashtag"></i> kurallar</li>
            </ul>
            <div class="user-profile">
                <img id="myAvatar" src="" alt="Profil">
                <span id="myNameDisplay">Kullanıcı</span>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <h3><i class="fa-solid fa-hashtag"></i> genel-sohbet</h3>
            </div>
            
            <div class="messages" id="messages">
                <!-- Mesajlar Buraya Düşecek -->
            </div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Neon mesajını gönder..." autocomplete="off">
                <button id="sendBtn" class="neon-btn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
